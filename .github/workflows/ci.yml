name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6  # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag

      - uses: astral-sh/setup-uv@v7  # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv sync

      # Lint + typecheck + tests (mirrors `make ci`)
      - run: make ci

      # MANIFEST.md is generated from page frontmatter — fail if it's stale.
      - name: manifest is committed in sync
        run: |
          python3 scripts/build_manifest.py
          git diff --exit-code playbook/MANIFEST.md
