name: Security
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 12 * * 1'
permissions:
  contents: read
  security-events: write
jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.168.0
    steps:
      - uses: actions/checkout@v7  # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: semgrep ci --sarif --output=semgrep.sarif
        env:
          SEMGREP_RULES: >-
            p/python
            p/security-audit
            p/secrets
            p/owasp-top-ten
      - uses: github/codeql-action/upload-sarif@v4  # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7  # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
      - uses: aquasecurity/trivy-action@v0.36.0  # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v4  # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
